<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>東訊 TecomView 硬碟容量錄影計算機</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style type="text/css">
        * {
            box-sizing: border-box;
        }
        body {
            background-image: linear-gradient(135deg, #152238, #192d4e, #2c4a6f);
            background-repeat: no-repeat;
            background-attachment: fixed;
            margin: 0;
            padding: 15px;
            font-family: "Microsoft JhengHei", Arial, Helvetica, sans-serif;
            color: #333333;
        }
        #id_Main_BOX {
            width: 100%;
            max-width: 1300px;
            margin: 10px auto;
            background-color: rgba(255, 255, 255, 0.96);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.4);
        }
        #id_Head_Table {
            width: 100%;
            border-collapse: collapse;
        }
        .header-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid #2b6cb0;
            padding-bottom: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .logo-box {
            flex: 0 0 auto;
            margin-bottom: 10px;
        }
        .title-box {
            text-align: right;
            flex: 1;
        }
        .title-main {
            font-size: 26px;
            font-weight: bold;
            color: #1a365d;
            margin: 0;
        }
        .title-sub {
            font-size: 14px;
            color: #4a5568;
            margin: 5px 0 0 0;
        }
        .row_1 {
            background-color: #f7fafc;
            padding: 15px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 15px;
            font-weight: bold;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .row_1 label {
            cursor: pointer;
            margin-right: 5px;
            font-weight: normal;
        }
        #id_Content_Div {
            width: 100%;
            overflow-x: auto;
            margin-bottom: 20px;
        }
        #id_Content_Div table {
            width: 100%;
            border-collapse: collapse;
            min-width: 800px;
        }
        #id_Content_Div .row_txt td {
            background-color: #ebf8ff;
            font-weight: bold;
            color: #2b6cb0;
            padding: 10px 5px;
        }
        #id_Content_Div td {
            border: 1px solid #e2e8f0;
            padding: 8px 6px;
            text-align: center;
            font-size: 14px;
        }
        #id_Content_Div tr:nth-child(even):not(.row_txt) {
            background-color: #fcfcfc;
        }
        .col_ch { width: 10%; }
        .col_res { width: 12%; }
        .col_fps { width: 10%; }
        .col_bit { width: 16%; }
        .col_audio { width: 10%; }
        .col_hour { width: 16%; }
        .col_day { width: 16%; }
        
        .resList, .fpsList, .bitList, .audList, .stList {
            width: 100%;
            height: 28px;
            border-radius: 4px;
            border: 1px solid #cbd5e0;
            padding: 2px;
        }
        .bitInput {
            width: 100%;
            height: 28px;
            border: 1px solid #cbd5e0;
            border-radius: 4px;
            text-align: center;
        }
        #id_footer_div {
            width: 100%;
            background-color: #edf2f7;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
        }
        .footer-flex {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }
        .footer-left {
            flex: 1;
            min-width: 300px;
        }
        .footer-right {
            text-align: right;
            min-width: 250px;
        }
        .footer-table td {
            text-align: left;
            padding: 4px 10px;
            font-weight: bold;
            font-size: 14px;
        }
        .result-val {
            color: #dd6b20;
            font-size: 16px;
        }
        #idBtnCal {
            width: 160px;
            height: 45px;
            font-size: 18px;
            font-weight: bold;
            color: #ffffff;
            background-color: #dd6b20;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        #idBtnCal:hover {
            background-color: #c05621;
        }
        #hddList, #idHddInput {
            height: 30px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 4px;
            border: 1px solid #cbd5e0;
            padding: 2px 5px;
        }
    </script>
    <script type="text/javascript">
        $(document).ready(function(){
            var defRadio = 16;
            var maxRadio = 64;
            var radio_val = defRadio;
            var bHideResFps = true;
            
            var D1_FPS = [
                [32,48,64,80,96,128,160],[64,80,96,128,160,192,224,256,320],
				[80,96,128,160,192,224,256,320,384,448,512],
				[128,160,192,224,256,320,384,448,512,640],
				[160,192,224,256,320,384,448,512,640,768,896],
				[160,192,224,256,320,384,448,512,640,768,896,1024],
				[192,224,256,320,384,448,512,640,768,896,1024,1280],
				[192,224,256,320,384,448,512,640,768,896,1024,1280],
				[224,256,320,384,448,512,640,768,896,1024,1280],
				[224,256,320,384,448,512,640,768,896,1024,1280],
				[256,320,384,448,512,640,768,896,1024,1280,1536],
				[256,320,384,448,512,640,768,896,1024,1280,1536],
				[320,384,448,512,640,768,896,1024,1280,1536,1792],
				[320,384,448,512,640,768,896,1024,1280,1536,1792],
				[320,384,448,512,640,768,896,1024,1280,1536,1792,2048],
				[384,448,512,640,768,896,1024,1280,1536,1792,2048],
				[384,448,512,640,768,896,1024,1280,1536,1792,2048],
				[384,448,512,640,768,896,1024,1280,1536,1792,2048],
				[448,512,640,768,896,1024,1280,1536,1792,2048],
				[448,512,640,768,896,1024,1280,1536,1792,2048],
				[448,512,640,768,896,1024,1280,1536,1792,2048],
				[512,640,768,896,1024,1280,1536,1792,2048],
				[512,640,768,896,1024,1280,1536,1792,2048],
				[512,640,768,896,1024,1280,1536,1792,2048],
				[640,768,896,1024,1280,1536,1792,2048],
				[640,768,896,1024,1280,1536,1792,2048],
				[640,768,896,1024,1280,1536,1792,2048],
				[640,768,896,1024,1280,1536,1792,2048],
				[640,768,896,1024,1280,1536,1792,2048],
				[768,896,1024,1280,1536,1792,2048]
            ];
            var HD1_FPS = [ [32],[32,48,64,80],[32,48,64,80,96,128],[32,48,64,80,96,128,160],[48,64,80,96,128,160,192,224],[48,64,80,96,128,160,192,224],[48,64,80,96,128,160,192,224,256],[48,64,80,96,128,160,192,224,256],[48,64,80,96,128,160,192,224,256,320],[64,80,96,128,160,192,224,256,320],[64,80,96,128,160,192,224,256,320,384],[64,80,96,128,160,192,224,256,320,384],[64,80,96,128,160,192,224,256,320,384],[80,96,128,160,192,224,256,320,384,448],[80,96,128,160,192,224,256,320,384,448],[80,96,128,160,192,224,256,320,384,448],[80,96,128,160,192,224,256,320,384,448,512],[96,128,160,192,224,256,320,384,448,512],[96,128,160,192,224,256,320,384,448,512,640],[128,160,192,224,256,320,384,448,512,640],[128,160,192,224,256,320,384,448,512,640],[128,160,192,224,256,320,384,448,512,640,768],[128,160,192,224,256,320,384,448,512,640,768],[128,160,192,224,256,320,384,448,512,640,768],[160,192,224,256,320,384,448,512,640,768,896],[160,192,224,256,320,384,448,512,640,768,896],[160,192,224,256,320,384,448,512,640,768,896],[160,192,224,256,320,384,448,512,640,768,896],[160,192,224,256,320,384,448,512,640,768,896,1024],[192,224,256,320,384,448,512,640,768,896,1024] ];
            var CIF_FPS = [ [32],[32,48],[32,48,64],[48,64,80],[48,64,80],[48,64,80,96],[48,64,80,96,128],[64,80,96,128],[64,80,96,128,160],[64,80,96,128,160,192],[64,80,96,128,160,192],[80,96,128,160,192],[80,96,128,160,192,224],[80,96,128,160,192,224],[80,96,128,160,192,224,256],[80,96,128,160,192,224,256],[96,128,160,192,224,256],[96,128,160,192,224,256],[96,128,160,192,224,256,320],[96,128,160,192,224,256,320],[128,160,192,224,256,320],[128,160,192,224,256,320,384],[128,160,192,224,256,320,384,448],[160,192,224,256,320,384,448],[160,192,224,256,320,384,448,512],[160,192,224,256,320,384,448,512],[192,224,256,320,384,448,512],[192,224,256,320,384,448,512,640],[192,224,256,320,384,448,512,640,768],[224,256,320,384,448,512,640,768] ];
            
            var arr_720P = [1024,2048,3072,4096,5120,6144];
            var arr_1080P = [1024,2048,3072,4096,5120,6144,8192];
            var arr_3MP = [1024,2048,3072,4096,5120,6144,8192];
            var arr_4MP = [1024,2048,3072,4096,5120,6144,8192];
            var arr_5MP = [1024,2048,3072,4096,5120,6144,8192];
            var arr_8MP = [1024,2048,3072,4096,5120,6144,8192];
            
            initHtml_Table();
            initHtml_List();
            setDefSel();
            HideResFps();

            $("input:radio[name='CH']").click(function(){
                radio_val = $(this).val()*1;
                ResetVal();
                for(var i=0; i<maxRadio; i++){
                    if(i < radio_val){
                        $("#row_"+i).show();
                        $("#ck_"+i).prop("disabled",false).prop("checked",true);
                        $("#row_"+i+" select, #row_"+i+" input").prop("disabled",false);
                    } else {
                        $("#row_"+i).hide();
                        $("#ck_"+i).prop("checked",false).prop("disabled","disabled");
                    }
                }
            });
            
            $("select[id^='res_main_all']").change(function(){
                var curVal = $(this).val();
                for(var i=0; i<radio_val; i++){
                    $("#res_main_"+i).val(curVal).change();
                }
            });

            $("select[id^='fps_main_all']").change(function(){
                var curVal = $(this).val();
                for(var i=0; i<radio_val; i++){
                    $("#fps_main_"+i).val(curVal).change();
                }
            });

            $("select[id^='bit_main_all']").change(function(){
                var curVal = $(this).val();
                for(var i=0; i<radio_val; i++){
                    $("#bit_main_"+i).val(curVal);
                    $("#bit_maintxt_"+i).val(curVal);
                }
            });

            $("select[id^='aud_main_all']").change(function(){
                var curVal = $(this).val();
                for(var i=0; i<radio_val; i++){
                    $("#aud_main_"+i).val(curVal);
                }
            });

            // Single item handlers
            $(document).on('change', "select[id^='bit_main_']", function(){
                var ch = $(this).attr("id").split("_")[2];
                if(ch !== "all") {
                    $("#bit_maintxt_"+ch).val($(this).val());
                }
            });

            $("#idDualStream").click(function() {
                if($(this).prop("checked")){
                    $(".substream-col").show();
                }else{
                    $(".substream-col").hide();
                }
            });
            
            $("#hddList").change(function(){
                if($(this).val() == "user_defined"){
                    $("#td_hddInput").show();
                }else{
                    $("#td_hddInput").hide();
                }
            });
            
            $("#idBtnCal").click(function(){
                ResetVal();
                var arrCh_1Hour = [];
                var arrCh_1Day = [];
                var nCheckChannel = 0;
                
                for(var i=0; i<radio_val; i++){
                    if($("#ck_"+i).prop("checked")){
                        nCheckChannel++;
                        var nBit = $("#bit_maintxt_"+i).val()*1 || 32;
                        arrCh_1Hour[i] = (nBit*1.0/8)*3600/1024;
                        if($("#aud_main_"+i).val()*1 == 1){
                            arrCh_1Hour[i] += (8000 + 1000 * 1.0 / 60 * 44) * 3600 / 1024 / 1024;
                        }
                        
                        if($("#idDualStream").prop("checked")){
                            var nBitSub = $("#bit_subtxt_"+i).val()*1 || 32;
                            arrCh_1Hour[i] += (nBitSub*1.0/8)*3600/1024;
                        }
                        
                        arrCh_1Day[i] = arrCh_1Hour[i] * 24 / 1024;
                        $("#hour_" + i).html( arrCh_1Hour[i].toFixed(2) );
                        $("#day_" + i).html( arrCh_1Day[i].toFixed(2) );
                    }else{
                        arrCh_1Hour[i] = 0;
                        arrCh_1Day[i] = 0;
                    }
                }
                
                if(nCheckChannel == 0){
                    alert("請至少選擇一個頻道！");
                    return;
                }
                
                var fAllCh_1Hour = 0;
                var fAllCh_1Day = 0;
                for(var i=0; i<radio_val; i++){
                    fAllCh_1Hour += arrCh_1Hour[i] || 0;
                    fAllCh_1Day += arrCh_1Day[i] || 0;
                }
                
                $("#allCh_1hourUse").html( fAllCh_1Hour.toFixed(2) + " MB" );
                $("#allCh_1dayUse").html( fAllCh_1Day.toFixed(2) + " GB" );
                
                var nHddSize = $("#hddList").val();
                if(nHddSize == "user_defined"){
                    nHddSize = $("#idHddInput").val()*1000;
                }
                
                var base = 1000.0/1024;
                var realSize = nHddSize*1.0*base*base*base;
                $("#hdd_size").html(realSize.toFixed(2) + " GB");
                
                if(nHddSize >= 500){ realSize -= 8; }else{ realSize -= 7; }
                if(realSize < 0) realSize = 0;
                
                var fTotalTimeHour = (realSize*1024)/fAllCh_1Hour;
                var fTotalTimeDay = realSize/fAllCh_1Day;
                
                $("#canRec_hour").html( fTotalTimeHour.toFixed(2) + " 小時" );
                $("#canRec_day").html( fTotalTimeDay.toFixed(2) + " 天" );
            });
            
            function ResetVal(){
                for(var i=0; i<maxRadio; i++){
                    $("#hour_"+i).html("");
                    $("#day_"+i).html("");
                }
                $("#allCh_1hourUse, #allCh_1dayUse, #hdd_size, #canRec_hour, #canRec_day").html("");
            }
            
            function initHtml_Table(){
                var rowAll = '<tr class="row_all" style="background-color: #edf2f7; font-weight: bold;">' +
                    '<td>全選 All</td>' +
                    '<td class="col_res"><select class="resList" id="res_main_all"></select></td>' +
                    '<td class="col_fps"><select class="fpsList" id="fps_main_all"></select></td>' +
                    '<td class="col_bit"><select class="bitList" id="bit_main_all"></select></td>' +
                    '<td class="col_audio"><select class="audList" id="aud_main_all"></select></td>' +
                    '<td class="substream-col col_bit" style="display:none;"><input type="text" class="bitInput" value="128" id="bit_sub_all"></td>' +
                    '<td>-</td><td>-</td></tr>';
                
                $("#main_table_body").append(rowAll);
                
                for(var i=0; i<maxRadio; i++){
                    var strCh = "CH" + ((i+1)<10 ? ("0"+(i+1)) : (i+1));
                    var rowOneCh = '<tr id="row_'+i+'">' +
                        '<td class="col_ch"><label><input type="checkbox" id="ck_'+i+'" checked /> <span>'+strCh+'</span></label></td>' +
                        '<td class="col_res"><select class="resList" id="res_main_'+i+'"></select></td>' +
                        '<td class="col_fps"><select class="fpsList" id="fps_main_'+i+'"></select></td>' +
                        '<td class="col_bit"><input type="text" class="bitInput" value="2048" id="bit_maintxt_'+i+'" /></td>' +
                        '<td class="col_audio"><select class="audList" id="aud_main_'+i+'"></select></td>' +
                        '<td class="substream-col col_bit" style="display:none;"><input type="text" class="bitInput" value="256" id="bit_subtxt_'+i+'" /></td>' +
                        '<td class="col_hour" id="hour_'+i+'"></td>' +
                        '<td class="col_day" id="day_'+i+'"></td>' +
                        '</tr>';
                    $("#main_table_body").append(rowOneCh);
                }
            }
            
            function initHtml_List(){
                var arrRes = ["8MP","5MP","4MP","3MP","1080P","720P","D1","CIF"];
                var resOption = "";
                for(var i=0; i<arrRes.length; i++){
                    resOption += '<option value="'+arrRes[i]+'">'+arrRes[i]+'</option>';
                }
                $(".resList").append(resOption);
                
                var fpsOption = "";
                for(var i=1; i<=30; i++){
                    fpsOption += '<option value="'+(i-1)+'">'+i+'</option>';
                }
                $(".fpsList").append(fpsOption);
                
                var arrBit = ["32","64","128","256","512","1024","2048","4096","6144","8192"];
                var bitOption = "";
                for(var i=0; i<arrBit.length; i++){
                    bitOption += '<option value="'+arrBit[i]+'">'+arrBit[i]+'</option>';
                }
                $(".bitList").append(bitOption);
                
                var audOption = '<option value="0">關閉 OFF</option><option value="1">開啟 ON</option>';
                $(".audList").append(audOption);
            }
            
            function setDefSel(){
                $(".resList").val("1080P");
                $(".fpsList").val(29);
                $(".bitList").val("2048");
                $(".audList").val("0");
                $('input:radio[name="CH"][value="16"]').prop('checked',true).click();
            }
            
            function HideResFps(){}
        });
    </script>
</head>
<body>
    <div id="id_Main_BOX">
        <div class="header-container">
            <div class="logo-box">
                <!-- 預留東訊 TECOM Logo 置放處 -->
                <div style="font-size: 28px; font-weight: bold; color: #023e8a; font-family: sans-serif;">TECOM <span style="font-size:18px; color:#4a5568; font-weight:normal;">東訊股份公司</span></div>
            </div>
            <div class="title-box">
                <h1 class="title-main">東訊版錄影儲存容量計算機</h1>
                <p class="title-sub">HDD Recording Calculator (影像壓縮格式支援 H.265 / H.264)</p>
            </div>
        </div>
        
        <div class="row_1">
            <span>頻道選擇 Channel:</span>
            <label><input type="radio" value="4" name="CH"> 4路</label>
            <label><input type="radio" value="8" name="CH"> 8路</label>
            <label><input type="radio" value="16" name="CH"> 16路</label>
            <label><input type="radio" value="32" name="CH"> 32路</label>
            <label><input type="radio" value="64" name="CH"> 64路</label>
            <label style="margin-left:20px; color:#2b6cb0;"><input type="checkbox" id="idDualStream"> 啟用雙碼流 (Dual Stream)</label>
        </div>
        
        <div id="id_Content_Div">
            <table>
                <thead>
                    <tr class="row_txt">
                        <td class="col_ch">通道頻道</td>
                        <td class="col_res">解析度</td>
                        <td class="col_fps">張數 (FPS)</td>
                        <td class="col_bit">主碼流填寫 (Kbps)</td>
                        <td class="col_audio">錄音狀態</td>
                        <td class="substream-col col_bit" style="display:none; background-color:#e2e8f0;">子碼流填寫 (Kbps)</td>
                        <td class="col_hour">每小時所需容量</td>
                        <td class="col_day">每天所需容量</td>
                    </tr>
                </thead>
                <tbody id="main_table_body">
                    <!-- 由 JavaScript 動態生成 -->
                </tbody>
            </table>
        </div>
        
        <div id="id_Main_BOX" style="box-shadow: none; padding: 0; background: none; margin-top:20px;">
            <div id="id_footer_div">
                <div class="footer-flex">
                    <div class="footer-left">
                        <table class="footer-table">
                            <tr>
                                <td>所有通道每小時總需求:</td>
                                <td id="allCh_1hourUse" class="result-val">-</td>
                            </tr>
                            <tr>
                                <td>所有通道每天總需求:</td>
                                <td id="allCh_1dayUse" class="result-val">-</td>
                            </tr>
                        </table>
                    </div>
                    
                    <div class="footer-left">
                        <table class="footer-table">
                            <tr>
                                <td>選擇硬碟規格:</td>
                                <td>
                                    <select id="hddList">
                                        <option value="1000">1 TB</option>
                                        <option value="2000">2 TB</option>
                                        <option value="4000">4 TB</option>
                                        <option value="6000">6 TB</option>
                                        <option value="8000">8 TB</option>
                                        <option value="10000">10 TB</option>
                                        <option value="16000">16 TB</option>
                                        <option value="user_defined">自訂規格</option>
                                    </select>
                                </td>
                            </tr>
                            <tr id="td_hddInput" style="display:none;">
                                <td>輸入自訂容量 (TB):</td>
                                <td><input type="text" id="idHddInput" style="width:100px;" placeholder="例如: 12"> TB</td>
                            </tr>
                            <tr>
                                <td>硬碟實際可用總空間:</td>
                                <td id="hdd_size" class="result-val">-</td>
                            </tr>
                        </table>
                    </div>
                    
                    <div class="footer-right">
                        <table class="footer-table" style="margin-bottom:10px;">
                            <tr>
                                <td>預估可錄影時間 (小時):</td>
                                <td id="canRec_hour" style="color:#e53e3e; font-size:18px;">-</td>
                            </tr>
